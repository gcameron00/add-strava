<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>Workouts · Activities</title>
    <meta name="description" content="Activities by sport with year-to-date totals and a filterable feed." />
    <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/assets/css/styles.css" />
    <script defer src="/assets/js/mock-data.js"></script>
    <script defer src="/assets/js/main.js"></script>
    <script defer src="/assets/js/activities.js"></script>
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <a class="brand" href="/">
          <img src="/assets/favicon.svg" alt="" />
          Workouts <span class="tag">Demo</span>
        </a>
        <button class="icon-btn nav-toggle" aria-label="Toggle navigation" aria-expanded="false">☰</button>
        <nav class="nav" aria-label="Primary">
          <a href="/">Dashboard</a>
          <a href="/activities/">Activities</a>
          <a href="/gear/">Gear</a>
          <a href="/restricted/">Restricted</a>
          <a href="/about/">About</a>
          <button class="icon-btn" data-theme-toggle aria-label="Toggle light/dark theme">◑</button>
        </nav>
      </div>
    </header>

    <main class="container">
      <div class="page-head">
        <div class="eyebrow">Activities</div>
        <h1>Activities by sport</h1>
        <p class="lede">Year-to-date totals per sport and a filterable feed of recent sessions. Use the buttons to focus on a single sport.</p>
      </div>

      <section class="section">
        <div class="section-head"><h2>Year to date</h2></div>
        <div class="grid cols-3" id="sport-summary"></div>
      </section>

      <section class="section">
        <div class="section-head"><h2>Activity feed</h2></div>
        <div class="access-links" id="sport-filters" style="justify-content:flex-start;margin-bottom:1rem"></div>
        <div class="card">
          <div class="table-wrap" id="activity-feed"></div>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <span>Workouts — a Strava dashboard mini-site.</span>
        <span class="spacer"></span>
        <a href="https://github.com/gcameron00/add-strava">Source</a>
        <a href="/about/">About</a>
      </div>
    </footer>
  </body>
</html>
